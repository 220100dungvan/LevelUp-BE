name: Deploy Backend

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/dung/levelup/ai-service
            git pull origin main
            cd /home/dung/levelup/backend
            git pull origin main
            docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build app
            docker compose -f docker-compose.prod.yml --env-file .env.production exec -T app sh -c "NODE_ENV=production npx prisma migrate deploy"